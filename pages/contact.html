<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="nav">

  <div class="logo">Sularis Studio</div>

  <!-- hamburger icon (mobile only) -->
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <!-- links -->
  <div class="nav-links" id="navLinks">
    <a href="../index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="about.html" >About</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html" class="active">Contact</a>
  </div>

</div>

<div class="header">
  <h1>Contact</h1>
</div>

<form action="https://formspree.io/f/YOUR_ID" method="POST" class="contact-form">

   <!-- Honeypot field (bots will fill this, humans won't) -->
  <input type="text" name="_gotcha" style="display:none">
  
  <input type="text" name="name" placeholder="Your Name" required>

  <input type="email" name="email" placeholder="Your Email" required>

  <select name="service" required>
    <option value="">What are you interested in?</option>
    <option value="wedding">Wedding</option>
    <option value="senior">Senior Photos</option>
    <option value="family">Family Session</option>
    <option value="other">Other</option>
  </select>

  <input type="date" name="preferred_date">

  <input type="text" name="location" placeholder="Location (optional)">

  <textarea name="message" placeholder="Tell me about your session..." rows="6" required></textarea>

  <button type="submit">Send Message</button>

</form>

  
<div class="section">
  <p>Email: yourname@example.com</p>
</div>

<footer>© 2026 Sularis Studio</footer>

<script src="../assets/script.js"></script>
  
</body>
</html>
