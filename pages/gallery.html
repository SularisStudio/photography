<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="nav">

  <div class="logo">Sularis Studio</div>

  <!-- hamburger icon (mobile only) -->
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <!-- links -->
  <div class="nav-links" id="navLinks">
    <a href="../index.html">Home</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="about.html" >About</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </div>

</div>
  
<div class="header">
  <h1>Gallery</h1>
</div>




<div class="gallery-grid">

  <div class="gallery-item">
    <img src="../images/gallery1.jpg" onclick="openLightbox(0)">
  </div>

  <div class="gallery-item">
    <img src="../images/gallery2.jpg" onclick="openLightbox(1)">
  </div>

  <div class="gallery-item">
    <img src="../images/gallery3.jpg" onclick="openLightbox(2)">
  </div>

  <div class="gallery-item">
    <img src="../images/gallery4.jpg" onclick="openLightbox(3)">
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <span class="close" onclick="closeLightbox()">×</span>

  <span class="arrow left" onclick="changeSlide(-1)">❮</span>

  <img id="lightbox-img">

  <span class="arrow right" onclick="changeSlide(1)">❯</span>

</div>

  
<footer>© 2026 Sularis Studio</footer>

<script src="../assets/script.js"></script>
  
</body>
</html>
