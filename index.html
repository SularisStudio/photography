<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sularis Studio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sularis Studio</h1>

    <a href="#about">About</a>

  </nav>

  <section id="hero">
    <h2>Capturing moments that matter</h2>

  <section id="gallery">
    <h2>Gallery</h2>
    <div class="grid">
      <img src="https://source.unsplash.com/random/600x600?nature" />
      <img src="https://source.unsplash.com/random/600x600?portrait" />
      <img src="https://source.unsplash.com/random/600x600?city" />
      <img src="https://source.unsplash.com/random/600x600?landscape" />

  <section id="about">
    <h2>About</h2>
    <p>
      Welcome to my photography portfolio. I focus on capturing emotion,
      light, and storytelling through images.
    </p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: yourname@example.com</p>
  </section>

  <footer>
    <p>© 2026 Sularis Studio</p>
  </footer>

  <script src="script.js"></script>

</html>
